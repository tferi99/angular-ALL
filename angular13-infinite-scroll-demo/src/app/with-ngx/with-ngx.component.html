<div class="infinite-page">
  <h3>With ngx-infinite-scroll</h3>

  <div
    class="scroll-container"
    infiniteScroll
    [infiniteScrollDistance]="scrollDistance"
    [infiniteScrollThrottle]="throttle"
    (scrolled)="onScroll()"
    [scrollWindow]="false"
    [class.loading]="loading"
  >
    <div class="scroll-content" [class.force-scroll]="hasMore">
      <div class="item" *ngFor="let item of data; trackBy: trackByValue">
        Item #{{ item }}
      </div>
    </div>
  </div>

  <div class="status-line">
    <span>Pages fetched: {{lastPageIdx}} | Fetched items: {{ data.length }} | {{ statusMessage }}</span>
  </div>
</div>
